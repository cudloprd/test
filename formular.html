<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontaktní formulář</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Inter", sans-serif;
            background: #f4f4f9;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #fff;
            border-radius: 1.25rem;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            padding: 2rem 2.5rem;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .form-sub {
            color: #888;
            font-size: 0.92rem;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.35rem;
            color: #333;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 0.75rem;
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.15s;
            outline: none;
            background: #fafafa;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #1a1a2e;
            background: #fff;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        .form-btn {
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 0.75rem;
            background: #1a1a2e;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .form-btn:hover {
            opacity: 0.85;
        }
        #formFeedback {
            margin-top: 1rem;
            text-align: center;
            font-weight: 600;
            display: none;
        }
        .success {
            color: #2e7d32;
        }
        .error {
            color: #d32f2f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📩 Kontaktujte nás</h1>
        <p class="form-sub">Napište nám a my se vám ozveme</p>

        <form id="contactForm">
            <div class="form-group">
                <label for="name">Jméno *</label>
                <input type="text" id="name" name="name" placeholder="Jan Novák" required>
            </div>

            <div class="form-group">
                <label for="email">E-mail *</label>
                <input type="email" id="email" name="email" placeholder="jan.novak@example.cz" required>
            </div>

            <div class="form-group">
                <label for="phone">Telefon</label>
                <input type="tel" id="phone" name="phone" placeholder="+420 123 456 789">
            </div>

            <div class="form-group">
                <label for="message">Zpráva *</label>
                <textarea id="message" name="message" placeholder="Vaša zpráva..." required></textarea>
            </div>

            <button type="submit" class="form-btn">Odeslat</button>
        </form>

        <div id="formFeedback"></div>
    </div>

    <script>
        document.getElementById("contactForm").addEventListener("submit", async function (e) {
            e.preventDefault();
            const fb = document.getElementById("formFeedback");
            fb.style.display = "block";
            fb.className = "";
            fb.textContent = "⏳ Odesílám...";

            try {
                const res = await fetch("https://api.web3forms.com/submit", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        access_key: "f5dd69e0-ccca-4514-963e-d8804cc8f511",
                        subject: "Nová zpráva z kontaktního formuláře",
                        from_name: document.getElementById("name").value,
                        email: document.getElementById("email").value,
                        phone: document.getElementById("phone").value,
                        message: document.getElementById("message").value,
                    }),
                });
                const data = await res.json();
                if (data.success) {
                    fb.className = "success";
                    fb.textContent = "✅ Děkujeme! Vaša zpráva byla odeslána.";
                    this.reset();
                } else {
                    throw new Error(data.message || "Chyba při odesílání");
                }
            } catch (err) {
                fb.className = "error";
                fb.textContent = "❌ " + err.message;
            }
        });
    </script>
</body>
</html>
