<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Konfigurátor kol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Inter", sans-serif;
        background: #f4f4f9;
        color: #1a1a2e;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 2rem 1rem;
      }
      .container {
        max-width: 1100px;
        width: 100%;
      }
      h1 {
        text-align: center;
        font-size: 2.25rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 0.5rem;
      }
      .subtitle {
        text-align: center;
        color: #666;
        margin-bottom: 2.5rem;
        font-size: 1.05rem;
      }
      .config-wrap {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
        margin-bottom: 2rem;
      }
      .preview {
        background: #fff;
        border-radius: 1.25rem;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        padding: 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 400px;
        position: relative;
      }
      .bike {
        position: relative;
        width: 380px;
        height: 260px;
      }
      .part {
        position: absolute;
        transition: all 0.35s ease;
      }
      .frame {
        width: 220px;
        height: 8px;
        background: #e53935;
        border-radius: 6px;
        top: 140px;
        left: 80px;
        transform: rotate(-8deg);
      }
      .frame-seat {
        width: 110px;
        height: 8px;
        background: #e53935;
        border-radius: 6px;
        top: 100px;
        left: 100px;
        transform: rotate(35deg);
      }
      .frame-head {
        width: 70px;
        height: 8px;
        background: #e53935;
        border-radius: 6px;
        top: 90px;
        left: 210px;
        transform: rotate(70deg);
      }
      .frame-chain {
        width: 90px;
        height: 6px;
        background: #e53935;
        border-radius: 4px;
        top: 175px;
        left: 110px;
        transform: rotate(12deg);
      }
      .wheel {
        width: 100px;
        height: 100px;
        border: 5px solid #333;
        border-radius: 50%;
        top: 150px;
      }
      .wheel-f {
        left: 220px;
      }
      .wheel-r {
        left: 60px;
      }
      .wheel-spoke {
        width: 2px;
        height: 90px;
        background: #555;
        border-radius: 2px;
        top: 5px;
        left: 49px;
      }
      .wheel-spoke::after {
        content: "";
        position: absolute;
        width: 90px;
        height: 2px;
        background: #555;
        top: 44px;
        left: -45px;
      }
      .handlebars {
        width: 50px;
        height: 6px;
        background: #444;
        border-radius: 4px;
        top: 62px;
        left: 220px;
        transform: rotate(10deg);
      }
      .handlebars-straight {
        width: 40px;
        height: 6px;
        background: #444;
        border-radius: 4px;
        top: 58px;
        left: 235px;
        transform: rotate(80deg);
      }
      .saddle {
        width: 55px;
        height: 14px;
        background: #222;
        border-radius: 8px 8px 4px 4px;
        top: 80px;
        left: 82px;
        transform: rotate(-6deg);
      }
      .saddle-post {
        width: 6px;
        height: 30px;
        background: #888;
        border-radius: 3px;
        top: 90px;
        left: 100px;
      }
      .chainring {
        width: 28px;
        height: 28px;
        border: 3px solid #666;
        border-radius: 50%;
        top: 160px;
        left: 140px;
      }
      .options {
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }
      .group {
        background: #fff;
        border-radius: 1rem;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        padding: 1rem 1.25rem;
      }
      .group-label {
        font-size: 0.82rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #888;
        margin-bottom: 0.6rem;
      }
      .group-options {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .group-options button {
        padding: 0.4rem 1rem;
        border: 2px solid #e0e0e0;
        border-radius: 2rem;
        background: transparent;
        font-family: inherit;
        font-size: 0.88rem;
        font-weight: 500;
        color: #444;
        cursor: pointer;
        transition: all 0.15s ease;
      }
      .group-options button:hover {
        border-color: #888;
        background: #fafafa;
      }
      .group-options button.active {
        border-color: #1a1a2e;
        background: #1a1a2e;
        color: #fff;
      }
      .summary {
        background: #fff;
        border-radius: 1.25rem;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        padding: 1.5rem 2rem;
        margin-bottom: 2rem;
        text-align: center;
      }
      .summary h3 {
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #888;
        margin-bottom: 0.5rem;
      }
      .summary-items {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.5rem 1.25rem;
      }
      .summary-items span {
        font-size: 0.95rem;
      }
      .summary-items .val {
        font-weight: 600;
      }
      .cta {
        display: flex;
        justify-content: center;
        margin-bottom: 3rem;
      }
      .cta a {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.85rem 2.5rem;
        background: #1a1a2e;
        color: #fff;
        border-radius: 2rem;
        text-decoration: none;
        font-weight: 600;
        font-size: 1.05rem;
        transition: opacity 0.15s;
      }
      .cta a:hover {
        opacity: 0.85;
      }
      @media (max-width: 768px) {
        .config-wrap {
          grid-template-columns: 1fr;
        }
        body {
          padding: 1rem 0.5rem;
        }
        .bike {
          width: 300px;
          height: 220px;
        }
        .wheel {
          width: 80px;
          height: 80px;
        }
        .wheel-f {
          left: 180px;
        }
        .wheel-r {
          left: 45px;
        }
        .frame {
          width: 170px;
          left: 65px;
        }
        .frame-seat {
          width: 85px;
          top: 78px;
          left: 78px;
        }
        .frame-head {
          width: 55px;
          top: 70px;
          left: 170px;
        }
        .frame-chain {
          width: 70px;
          top: 140px;
          left: 88px;
        }
        .saddle {
          top: 60px;
          left: 65px;
        }
        .saddle-post {
          top: 72px;
          left: 82px;
        }
        .handlebars {
          top: 47px;
          left: 178px;
        }
        .handlebars-straight {
          top: 43px;
          left: 190px;
        }
        .chainring {
          top: 127px;
          left: 112px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>⚙️ Konfigurátor kol</h1>
      <p class="subtitle">Sestav si kolo podle svých představ</p>

      <div class="config-wrap">
        <div class="preview">
          <div class="bike" id="bikePreview">
            <div class="part frame" id="partFrame"></div>
            <div class="part frame-seat" id="partSeatTube"></div>
            <div class="part frame-head" id="partHeadTube"></div>
            <div class="part frame-chain" id="partChainStay"></div>
            <div class="part wheel wheel-r" id="partWheelR"><div class="wheel-spoke"></div></div>
            <div class="part wheel wheel-f" id="partWheelF"><div class="wheel-spoke"></div></div>
            <div class="part handlebars" id="partBar"></div>
            <div class="part handlebars-straight" id="partBarStem"></div>
            <div class="part saddle" id="partSaddle"></div>
            <div class="part saddle-post" id="partSaddlePost"></div>
            <div class="part chainring" id="partChainring"></div>
          </div>
        </div>
        <div class="options" id="options"></div>
      </div>

      <div class="summary" id="summary">
        <h3>Tvoje sestava</h3>
        <div class="summary-items" id="summaryItems">
          <span style="color: #999">Zatím nic nevybráno</span>
        </div>
      </div>

      <div class="cta">
        <a href="formular.html" id="ctaBtn">📩 Máš zájem? Odeslat poptávku →</a>
      </div>
    </div>

    <script>
      const groups = [
        {
          id: "frameColor",
          label: "Barva rámu",
          options: [
            { id: "red", label: "Červená", color: "#d32f2f" },
            { id: "blue", label: "Modrá", color: "#1565c0" },
            { id: "green", label: "Zelená", color: "#2e7d32" },
            { id: "black", label: "Černá", color: "#222" },
            { id: "white", label: "Bílá", color: "#eee" },
          ],
        },
        {
          id: "wheelType",
          label: "Kola",
          options: [
            { id: "road", label: "Cestovní", color: "#333" },
            { id: "mountain", label: "Horská", color: "#555" },
            { id: "city", label: "Městská", color: "#888" },
          ],
        },
        {
          id: "bars",
          label: "Řidítka",
          options: [
            { id: "flat", label: "Rovná" },
            { id: "drop", label: "Zahnutá" },
            { id: "butterfly", label: "Motýlková" },
          ],
        },
        {
          id: "saddle",
          label: "Sedlo",
          options: [
            { id: "black", label: "Černé", color: "#1a1a1a" },
            { id: "brown", label: "Hnědé", color: "#5d3a1a" },
            { id: "white", label: "Bílé", color: "#ddd" },
          ],
        },
        {
          id: "gears",
          label: "Převody",
          options: [
            { id: "single", label: "Jednostupňové" },
            { id: "3speed", label: "3-stupňové" },
            { id: "21speed", label: "21-stupňové" },
          ],
        },
      ]

      const sel = {}

      function renderOptions() {
        const root = document.getElementById("options")
        root.innerHTML = groups
          .map(
            (g) => `
          <div class="group">
            <div class="group-label">${g.label}</div>
            <div class="group-options" data-group="${g.id}">
              ${g.options
                .map(
                  (o) => `
                <button data-id="${o.id}" class="${sel[g.id] === o.id ? "active" : ""}">${o.label}</button>
              `,
                )
                .join("")}
            </div>
          </div>
        `,
          )
          .join("")

        root.querySelectorAll(".group-options button").forEach((btn) => {
          btn.addEventListener("click", () => {
            const gid = btn.closest(".group-options").dataset.group
            const oid = btn.dataset.id
            sel[gid] = sel[gid] === oid ? null : oid
            renderOptions()
            updatePreview()
            updateSummary()
          })
        })
      }

      function updatePreview() {
        const fc = groups.find((g) => g.id === "frameColor")
        const fSel = fc ? fc.options.find((o) => o.id === sel.frameColor) : null
        const frameColor = fSel ? fSel.color : "#bbb"

        const wt = groups.find((g) => g.id === "wheelType")
        const wSel = wt ? wt.options.find((o) => o.id === sel.wheelType) : null
        const wheelColor = wSel ? wSel.color : "#bbb"

        const s = groups.find((g) => g.id === "saddle")
        const sSel = s ? s.options.find((o) => o.id === sel.saddle) : null
        const saddleColor = sSel ? sSel.color : "#bbb"

        document.querySelectorAll(".frame, .frame-seat, .frame-head, .frame-chain").forEach((el) => {
          el.style.background = frameColor
        })
        document.querySelectorAll(".wheel").forEach((el) => {
          el.style.borderColor = wheelColor
        })
        document.getElementById("partSaddle").style.background = saddleColor
      }

      function updateSummary() {
        const items = document.getElementById("summaryItems")
        const picks = groups
          .map((g) => {
            const o = g.options.find((opt) => opt.id === sel[g.id])
            return o
              ? `<span><span style="color:#888;">${g.label}:</span> <span class="val">${o.label}</span></span>`
              : null
          })
          .filter(Boolean)
        items.innerHTML = picks.length ? picks.join("") : '<span style="color:#999;">Zatím nic nevybráno</span>'

        const cta = document.getElementById("ctaBtn")
        const params = new URLSearchParams()
        groups.forEach((g) => {
          const o = g.options.find((opt) => opt.id === sel[g.id])
          if (o) params.set(g.id, o.label)
        })
        cta.href = "formular.html?" + params.toString()
      }

      renderOptions()
      updatePreview()
      updateSummary()
    </script>
  </body>
</html>
